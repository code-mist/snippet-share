<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="基于 GitHub 仓库的跨平台片段分享页面，国内可访问">
  <meta name="theme-color" content="#0071e3">
  <title>片段分享 · Snippet Share</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="brand">📌 片段分享</h1>
      <div class="actions">
        <button id="newBtn" class="btn btn-primary">+ 新建</button>
        <button id="settingsBtn" class="btn icon-btn" title="设置">⚙</button>
      </div>
    </header>

    <main class="main">
      <aside class="sidebar">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="🔍 搜索片段...">
        </div>
        <div class="snippet-list" id="snippetList">
          <div class="empty">加载中...</div>
        </div>
      </aside>
      <section class="content" id="content">
        <div class="welcome">
          <h2>欢迎使用片段分享</h2>
          <p>从左侧选择一个片段，或点击右上角"新建"创建片段。</p>
          <p class="hint-text">首次使用请先在 ⚙ 设置 中配置 GitHub 仓库，或直接使用 URL 分享链接。</p>
        </div>
      </section>
    </main>
  </div>

  <!-- 新建片段弹窗 -->
  <div class="modal" id="newModal" hidden>
    <div class="modal-content">
      <div class="modal-header">
        <h2>新建片段</h2>
        <button class="close" data-close="newModal" aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label>标题</label>
          <input type="text" id="snippetTitle" placeholder="片段标题" maxlength="100">
        </div>
        <div class="form-row two-col">
          <div>
            <label>语言</label>
            <select id="snippetLang">
              <option value="javascript">JavaScript</option>
              <option value="typescript">TypeScript</option>
              <option value="python">Python</option>
              <option value="java">Java</option>
              <option value="go">Go</option>
              <option value="rust">Rust</option>
              <option value="cpp">C++</option>
              <option value="c">C</option>
              <option value="csharp">C#</option>
              <option value="php">PHP</option>
              <option value="ruby">Ruby</option>
              <option value="html">HTML</option>
              <option value="css">CSS</option>
              <option value="scss">SCSS</option>
              <option value="json">JSON</option>
              <option value="xml">XML</option>
              <option value="yaml">YAML</option>
              <option value="sql">SQL</option>
              <option value="bash">Bash</option>
              <option value="shell">Shell</option>
              <option value="powershell">PowerShell</option>
              <option value="markdown">Markdown</option>
              <option value="dockerfile">Dockerfile</option>
              <option value="plaintext">纯文本</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <label>描述（可选）</label>
          <input type="text" id="snippetDesc" placeholder="一句话说明" maxlength="200">
        </div>
        <div class="form-row">
          <label>代码</label>
          <textarea id="snippetCode" rows="14" placeholder="在此粘贴代码..." spellcheck="false"></textarea>
        </div>
        <div class="form-error" id="newError"></div>
      </div>
      <div class="modal-footer">
        <button class="btn" data-close="newModal">取消</button>
        <button class="btn" id="shareLinkBtn" title="生成纯 URL 分享链接（无需后端，国内 100% 可访问）">🔗 生成分享链接</button>
        <button class="btn btn-primary" id="saveSnippet">保存到 GitHub</button>
      </div>
    </div>
  </div>

  <!-- 设置弹窗 -->
  <div class="modal" id="settingsModal" hidden>
    <div class="modal-content">
      <div class="modal-header">
        <h2>设置</h2>
        <button class="close" data-close="settingsModal" aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <p class="hint">使用 GitHub 仓库作为片段存储后端，读取通过 jsdelivr CDN（国内可访问）。</p>
        <div class="form-row">
          <label>GitHub 仓库（用户名/仓库名）</label>
          <input type="text" id="cfgRepo" placeholder="例如：octocat/my-snippets">
        </div>
        <div class="form-row">
          <label>分支</label>
          <input type="text" id="cfgBranch" placeholder="main" value="main">
        </div>
        <div class="form-row">
          <label>Personal Access Token（用于保存新片段）</label>
          <input type="password" id="cfgToken" placeholder="ghp_xxxxxxxxxxxx">
          <small>仅保存在浏览器本地。需要 <code>repo</code> 权限。<a href="https://github.com/settings/tokens/new?scopes=repo" target="_blank" rel="noopener">创建 Token</a></small>
        </div>
        <div class="form-row">
          <label>CDN 域名</label>
          <input type="text" id="cfgCdn" placeholder="https://cdn.jsdelivr.net/gh" value="https://cdn.jsdelivr.net/gh">
          <small>国内可访问的备选：<code>https://gcore.jsdelivr.net/gh</code></small>
        </div>
        <div class="form-error" id="settingsError"></div>
      </div>
      <div class="modal-footer">
        <button class="btn" data-close="settingsModal">取消</button>
        <button class="btn btn-primary" id="saveSettings">保存</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
